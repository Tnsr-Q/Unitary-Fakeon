name: fakeon-verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python numeric + symbolic checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy sympy mpmath pytest ruff
      - name: Lint
        run: ruff check Fakeon/fakeon_numeric Fakeon/tests Fakeon/scripts
      - name: Dispersive reality check
        run: pytest Fakeon/tests/test_dispersive_reality.py -v
      - name: Sokhotski–Plemelj limit check
        run: pytest Fakeon/tests/test_distribution_limits.py -v
      - name: Chen integration check
        run: pytest Fakeon/tests/test_chen_integration.py -v
      - name: Unitarity closure check
        run: pytest Fakeon/tests/test_unitarity_closure.py -v
      - name: S-matrix extension validation (S.1–S.3)
        run: pytest Fakeon/tests/test_s_matrix_extension.py -v
      - name: Status matrix audit
        run: |
          python -m fakeon_numeric.status_tracker --root Fakeon --strict --out Fakeon/logs/status_matrix.json
      - name: Reproducibility anchor
        run: |
          python Fakeon/scripts/anchor_status.py build \
            --input Fakeon/logs/status_matrix.json \
            --out   Fakeon/logs/anchor.json
          python Fakeon/scripts/anchor_status.py verify \
            --anchor Fakeon/logs/anchor.json \
            --input  Fakeon/logs/status_matrix.json
      - name: Wedge vanishing check
        run: pytest Fakeon/tests/test_wedge_vanishing.py -v
      - name: Flatness check
        run: pytest Fakeon/tests/test_massive_flatness.py -v
      - name: Full regression
        run: pytest Fakeon/tests -v
      - name: Audit + status report
        run: |
          python Fakeon/scripts/audit_status.py --json
          echo "::group::STATUS.md"
          cat Fakeon/docs/STATUS.md
          echo "::endgroup::"

  lean:
    name: Lean proof verification
    runs-on: ubuntu-latest
    # Mathlib cache is heavy; keep opt-in until the proofs are promoted
    # from scaffolds to real content.
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: Fakeon
      - name: Lake build
        working-directory: Fakeon
        run: |
          lake exe cache get
          lake build
